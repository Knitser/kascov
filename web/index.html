<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>kascov — Kaspa covenant explorer</title>
  <meta name="description" content="The first covenant explorer for Kaspa L1. Trace KIP-20 covenant lineages — genesis, transitions, burns — inspect live UTXOs and scripts on testnet-10 and mainnet.">
  <meta property="og:title" content="kascov — Kaspa covenant explorer">
  <meta property="og:description" content="The first covenant explorer for Kaspa L1. Trace KIP-20 covenant lineages before node pruning erases them.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="kascov">
  <meta name="theme-color" content="#0b100f">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230b100f'/%3E%3Cpath d='M22 16v32M22 32l20-16M24 34l20 14' stroke='%2370C7BA' stroke-width='6' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <a class="wordmark" href="#/">kascov</a>
        <span class="tagline">covenant explorer for Kaspa L1</span>
      </div>
      <nav class="network-tabs" aria-label="Network">
        <button type="button" class="network-tab" data-network="testnet-10" aria-pressed="true">testnet-10</button>
        <button type="button" class="network-tab" data-network="mainnet" aria-pressed="false">mainnet</button>
      </nav>
    </div>
  </header>

  <main id="main" class="container">
    <div id="panel" class="panel" role="status" aria-live="polite" hidden></div>

    <section id="view-list" aria-label="Covenant overview" hidden>
      <div class="stats-grid" id="stats"></div>
      <p class="freshness" id="freshness"></p>

      <div class="toolbar">
        <div class="search-wrap">
          <svg class="search-icon" aria-hidden="true" viewBox="0 0 20 20" width="16" height="16"><circle cx="8.5" cy="8.5" r="5.5" fill="none" stroke="currentColor" stroke-width="2"/><line x1="12.8" y1="12.8" x2="17" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <input id="search" type="search" placeholder="search covenant id or event txid…" aria-label="Search covenants by covenant id or event transaction id" autocomplete="off" spellcheck="false">
        </div>
        <div class="chips" role="group" aria-label="Filter by status">
          <button type="button" class="chip" data-status="all" aria-pressed="true">all</button>
          <button type="button" class="chip" data-status="active" aria-pressed="false">active</button>
          <button type="button" class="chip" data-status="burned" aria-pressed="false">burned</button>
        </div>
        <p class="result-count" id="result-count" aria-live="polite"></p>
      </div>

      <div id="cov-list" class="cov-list"></div>
      <div id="list-foot" class="list-foot"></div>
    </section>

    <section id="view-detail" aria-label="Covenant detail" hidden></section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p><a class="footer-link" href="https://github.com/Knitser/kascov" target="_blank" rel="noopener noreferrer">github.com/Knitser/kascov</a></p>
      <p>Kaspa nodes prune history after ~3 days — kascov indexes it before it&rsquo;s gone.</p>
      <p class="footer-dim">not affiliated with the Kaspa Foundation</p>
    </div>
  </footer>

  <noscript><div class="container panel"><p>kascov needs JavaScript to render covenant snapshots.</p></div></noscript>
  <script src="app.js"></script>
</body>
</html>
